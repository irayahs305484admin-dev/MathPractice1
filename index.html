        // --- MATH FORMATTER COMPONENT ---
        const MathText = ({ text }) => {
            if (typeof text !== 'string') return <span>{text}</span>;
            const tokens = text.split(' ');
            
            return (
                <span className="inline-flex flex-wrap items-center gap-x-1 justify-center align-middle">
                    {tokens.map((token, i) => {
                        // Check for fractions like 3/4 or -1/2 (with optional trailing punctuation)
                        const fracMatch = token.match(/^(-?\d+)\/(-?\d+)([.,!?:;]*)$/);
                        if (fracMatch) {
                            const [_, num, den, punc] = fracMatch;
                            return (
                                <span key={i} className="inline-flex items-center mx-1">
                                    <span className="fraction text-xl">
                                        <span className="fraction-num">{num}</span>
                                        <span className="fraction-line"></span>
                                        <span className="fraction-den">{den}</span>
                                    </span>
                                    {punc && <span>{punc}</span>}
                                </span>
                            );
                        }
                        
                        // Check for Exponents like x^2, (x^a)^b, or 3^4
                        const expMatch = token.match(/^([a-zA-Z0-9_()-]+)\^([a-zA-Z0-9_()+-]+)([.,!?:;]*)$/);
                        if (expMatch) {
                            const [_, base, exp, punc] = expMatch;
                            return (
                                <span key={i} className="inline-flex items-baseline mx-1">
                                    <span>{base}</span>
                                    <sup className="text-sm font-semibold">{exp}</sup>
                                    {punc && <span>{punc}</span>}
                                </span>
                            );
                        }

                        return <span key={i}>{token} </span>;
                    })}
                </span>
            );
        };

        // --- UTILITY / GENERATOR LOGIC ---
        const rInt = (min, max) => Math.floor(Math.random() * (max - min + 1) + min);
        const gcf = (a, b) => b === 0 ? a : gcf(b, a % b);

        const generateNumber = (digits, allowNegative = false) => {
            let min = Math.pow(10, digits - 1);
            let max = Math.pow(10, digits) - 1;
            if (digits === 1) min = 1;
            let num = rInt(min, max);
            if (allowNegative && Math.random() > 0.5) num *= -1;
            return num;
        };

        const checkRegrouping = (a, b, op, digits, wantRegrouping) => {
            const strA = a.toString().padStart(digits, '0');
            const strB = b.toString().padStart(digits, '0');
            let hasRegrouping = false;
            
            for (let i = 0; i < digits; i++) {
                let da = parseInt(strA[i]);
                let db = parseInt(strB[i]);
                if (op === '+') { if (da + db >= 10) hasRegrouping = true; }
                if (op === '-') { if (da < db) hasRegrouping = true; }
            }
            return wantRegrouping === 'mixed' ? true : wantRegrouping === 'with' ? hasRegrouping : !hasRegrouping;
        };

        const generateProblems = (category, settings, count) => {
            let problems = [];
            
            for (let i = 0; i < count; i++) {
                let q = "", ans = "", format = "number", qObj = null;
                let opList = settings.operation === 'mixed' ? ['+', '-', 'x', '÷'] : [settings.operation];
                let op = opList[Math.floor(Math.random() * opList.length)];
                
                if (category === "Whole Numbers" || category === "Integers" || category === "Decimals") {
                    let d = parseInt(settings.digits) || 2;
                    let isInt = category === "Integers";
                    let isDec = category === "Decimals";
                    let sign = settings.integerType; // positive, negative, mixed
                    
                    let a = generateNumber(d);
                    let b = generateNumber(d);
                    
                    if (isInt) {
                        if (sign === 'negative') { a = -a; b = -b; }
                        else if (sign === 'mixed') { a *= (Math.random() > 0.5 ? 1 : -1); b *= (Math.random() > 0.5 ? 1 : -1); }
                    }

                    // Handle regrouping logic for + and -
                    if ((op === '+' || op === '-') && settings.regrouping !== 'mixed' && !isDec) {
                        let attempts = 0;
                        while (!checkRegrouping(Math.abs(a), Math.abs(b), op, d, settings.regrouping) && attempts < 50) {
                            a = generateNumber(d); b = generateNumber(d);
                            if (isInt && sign === 'negative') { a = -a; b = -b; }
                            attempts++;
                        }
                        if (op === '-' && a < b && !isInt) { let temp = a; a = b; b = temp; }
                    } else if (op === '-' && !isInt && a < b) {
                        let temp = a; a = b; b = temp;
                    }

                    if (op === 'x' || op === '÷') {
                        let tbl = parseInt(settings.table);
                        if (tbl) b = isInt && sign==='negative' ? -tbl : tbl;
                        if (op === '÷') {
                            a = a * b; // ensure clean division
                            if (a === 0) a = b; // prevent 0/x if unwanted
                        }
                    }

                    let dispA = a; let dispB = b;
                    if (isDec) {
                        dispA = (a / Math.pow(10, Math.ceil(d/2))).toFixed(Math.ceil(d/2));
                        dispB = (b / Math.pow(10, Math.ceil(d/2))).toFixed(Math.ceil(d/2));
                    }

                    q = `${dispA} ${op} ${dispB}`;
                    
                    if ((category === "Whole Numbers" || category === "Decimals" || category === "Integers") && (op === '+' || op === '-' || op === 'x')) {
                        format = "vertical";
                        qObj = { num1: dispA, num2: dispB, op: op };
                    }

                    if (op === '+') ans = parseFloat(dispA) + parseFloat(dispB);
                    if (op === '-') ans = parseFloat(dispA) - parseFloat(dispB);
                    if (op === 'x') ans = parseFloat(dispA) * parseFloat(dispB);
                    if (op === '÷') ans = parseFloat(dispA) / parseFloat(dispB);

                    if (isDec) ans = parseFloat(ans.toFixed(4)).toString();
                    else ans = ans.toString();

                } else if (category === "Fractions") {
                    format = "fraction";
                    if (op === "simplifying") {
                        let den = rInt(2, 20);
                        let factor = rInt(2, 5);
                        let num = rInt(1, den - 1);
                        q = `Simplify: ${(num*factor)}/${(den*factor)}`;
                        let div = gcf(num, den);
                        ans = `${num/div}/${den/div}`;
                    } else {
                        let d1 = rInt(2, 10);
                        let d2 = settings.regrouping === 'dissimilar' ? rInt(2, 10) : d1;
                        let n1 = rInt(1, d1 * 2); // allow improper
                        let n2 = rInt(1, d2 * 2);
                        
                        if (d1===d2 && n1===n2) n2 = rInt(1, d2-1);
                        
                        q = `${n1}/${d1} ${op} ${n2}/${d2}`;
                        let numRes, denRes;

                        if (op === '+') { numRes = n1*d2 + n2*d1; denRes = d1*d2; }
                        if (op === '-') { numRes = n1*d2 - n2*d1; denRes = d1*d2; }
                        if (op === 'x') { numRes = n1*n2; denRes = d1*d2; }
                        if (op === '÷') { numRes = n1*d2; denRes = d1*n2; }

                        let div = gcf(Math.abs(numRes), Math.abs(denRes));
                        ans = `${numRes/div}/${denRes/div}`;
                        // Handle integer answers if denominator becomes 1
                        if (denRes/div === 1) { ans = `${numRes/div}`; format = "number"; }
                        if (denRes/div === -1) { ans = `${-numRes/div}`; format = "number"; }
                    }
                } else if (category === "Percentages") {
                    let type = opList[Math.floor(Math.random() * opList.length)];
                    let base = rInt(2, 20) * 10; 
                    let rate = rInt(1, 19) * 5; 
                    let perc = (base * rate) / 100;

                    if (type === 'find_percentage' || op === '+') {
                        q = `What is ${rate}% of ${base}?`;
                        ans = perc.toString();
                    } else if (type === 'find_rate' || op === '-') {
                        q = `${perc} is what percent of ${base}?`;
                        ans = rate.toString();
                    } else {
                        q = `${perc} is ${rate}% of what number?`;
                        ans = base.toString();
                    }
                } else if (category === "Exponents") {
                    let type = opList[Math.floor(Math.random() * opList.length)];
                    if (type === 'evaluate' || op === '+') {
                        let base = rInt(2, 9);
                        let exp = rInt(2, 4);
                        q = `Evaluate: ${base}^${exp}`;
                        ans = Math.pow(base, exp).toString();
                    } else { // Laws
                        let base = ['x', 'y', 'a', 'b'][rInt(0,3)];
                        let e1 = rInt(2, 8);
                        let e2 = rInt(2, 8);
                        let law = ['*', '/', '()'][rInt(0,2)];
                        if (law === '*') { q = `Simplify: ${base}^${e1} * ${base}^${e2}`; ans = `${base}^${e1+e2}`; format="text"; }
                        if (law === '/') { 
                            if (e1 < e2) { let t=e1; e1=e2; e2=t; }
                            q = `Simplify: ${base}^${e1} / ${base}^${e2}`; ans = `${base}^${e1-e2}`; format="text";
                        }
                        if (law === '()') { q = `Simplify: (${base}^${e1})^${e2}`; ans = `${base}^${e1*e2}`; format="text"; }
                    }
                }
                
                problems.push({ question: q, qObj: qObj, answer: ans, format: format });
            }
            return problems;
        };

        const App = () => {
            const [screen, setScreen] = useState('home');
            const [userName, setUserName] = useState('');
            const [category, setCategory] = useState('');

            const [tries, setTries] = useState(2);

                    integerType: 'mixed',
                    table: 'none',

                setCurrentQIndex(0);
                setScore(0);
                setTries(2);
                resetInputs();
                setFeedback('');
                setShowCorrect(false);
                setScreen('quiz');
            };

            const resetInputs = () => {
                setAnswerInput('');
                setNumInput('');
                setDenInput('');
            };

            // --- QUIZ LOGIC ---
            const checkAnswer = () => {
                const currentQ = questions[currentQIndex];
                let userAns = "";

                if (currentQ.format === 'fraction') {
                    if (!numInput || !denInput) { setFeedback("Please fill both numerator and denominator."); return; }
                    userAns = `${numInput.trim()}/${denInput.trim()}`;
                } else {
                    if (!answerInput) { setFeedback("Please enter an answer."); return; }
                    userAns = answerInput.trim().toLowerCase();
                }

                if (userAns === currentQ.answer.toLowerCase()) {
                    setScore(s => s + 1);
                    setFeedback("Correct! 🎉");
                    setShowCorrect(true);
                } else {
                    if (tries > 1) {
                        setTries(t => t - 1);
                        setFeedback(`Incorrect. You have 1 try left.`);
                    } else {
                        setFeedback(`Incorrect. The correct answer is:`);
                        setShowCorrect(true);
                    }
                }

                if (currentQIndex < questions.length - 1) {
                    setCurrentQIndex(c => c + 1);

                    resetInputs();

                            category: category,
                            score: score,
                            total: questions.length,
                            date: new Date().toISOString()
                        });
                    }

                    console.error("Firebase save error:", e);
                }

                // Fallback / Google Apps Script webhook
                try {
                    if (typeof google !== 'undefined' && google.script) {

                            timestamp: new Date().toISOString(),
                            name: userName,
                            topic: category,
                            score: score,
                            total: questions.length
                        });
                    }

                        const querySnapshot = await window.firebaseGetDocs(q);
                        const docs = [];
                        querySnapshot.forEach((doc) => docs.push(doc.data()));
                        setAdminData(docs);
                        setScreen('admin');

                        console.error("Admin fetch error", e);
                        setScreen('home');

                                    </select>
                                </div>

                                {/* Number settings */}
                                {(category === "Whole Numbers" || category === "Decimals" || category === "Integers") && (

                                                <option value="1">1 Digit</option><option value="2">2 Digits</option><option value="3">3 Digits</option><option value="4">4 Digits</option>

                                                    <option value="mixed">Mixed (Random)</option><option value="with">Always Regroup</option><option value="without">Without Regrouping</option>
                                                </select>

                                        {(settings.operation === 'x' || settings.operation === '÷') && (

                                                    <option value="none">Random</option>

                            <div className="p-10 flex-grow flex flex-col items-center justify-center min-h-[300px]">

            }

            if (screen === 'guides') {
                const guide = GUIDES_DATA[activeGuide][guideLang];
                return (
                    <div className="min-h-screen bg-gray-100 flex flex-col md:flex-row">
                        {/* Sidebar */}
                        <div className="w-full md:w-1/3 lg:w-1/4 bg-white shadow-lg z-10 flex flex-col">
                            <div className="p-6 bg-blue-600 text-white flex justify-between items-center">
                                <h2 className="text-2xl font-bold"><i className="fas fa-book mr-2"></i> Topics</h2>
                                <button onClick={() => setScreen('home')} className="hover:bg-blue-700 p-2 rounded"><i className="fas fa-home"></i></button>
                            </div>
                            <div className="flex-grow overflow-y-auto">
                                {Object.keys(GUIDES_DATA).map(topic => (
                                    <button 
                                        key={topic} 
                                        onClick={() => setActiveGuide(topic)}
                                        className={`w-full text-left p-4 border-b font-semibold transition ${activeGuide === topic ? 'bg-blue-50 text-blue-700 border-l-4 border-l-blue-600' : 'text-gray-700 hover:bg-gray-50'}`}

                            </div>
                        </div>
                        
                        {/* Main Content */}
                        <div className="w-full md:w-2/3 lg:w-3/4 p-6 md:p-10 overflow-y-auto max-h-screen">
                            <div className="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm p-8">
                                <div className="flex justify-between items-end border-b pb-4 mb-6">
                                    <h1 className="text-4xl font-bold text-gray-800">{activeGuide}</h1>
                                    <div className="flex bg-gray-100 rounded-lg p-1">
                                        <button onClick={() => setGuideLang('eng')} className={`px-4 py-2 text-sm font-bold rounded-md ${guideLang==='eng'?'bg-white shadow text-blue-600':'text-gray-500'}`}>English</button>

                                <h3 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2"><i className="fas fa-list-ol text-blue-500"></i> Steps / Rules</h3>

                                    ))}
                                </ul>

                                <h3 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2"><i className="fas fa-lightbulb text-amber-500"></i> Examples</h3>
                                <div className="grid gap-4">
                                    {guide.examples.map((ex, idx) => {
                                        if (typeof ex === 'string') {
                                            return (
                                                <div key={idx} className="bg-gray-800 text-white p-6 rounded-xl font-mono text-lg shadow-inner">
                                                    <MathText text={ex} />
                                                </div>
                                            );
                                        }
                                        if (ex.type === 'vertical') {
                                            return (
                                                <div key={idx} className="bg-gray-800 text-white p-6 rounded-xl font-mono text-lg shadow-inner flex flex-col md:flex-row items-center gap-8">
                                                    <div className="flex-col flex items-end">
                                                        <div className="text-gray-400 mb-2 font-sans text-sm font-bold uppercase tracking-wider w-full text-left">{ex.label}</div>
                                                        <div className="flex flex-col items-end text-3xl md:text-4xl font-bold tracking-widest bg-gray-900 p-6 rounded-xl border border-gray-700 shadow-md">
                                                            <div className="pr-2">{ex.num1}</div>
                                                            <div className="flex justify-between w-full min-w-[5em] border-b-4 border-gray-600 pb-2 mt-2">
                                                                <span className="text-blue-400 mr-6">{ex.op}</span>
                                                                <span className="pr-2">{ex.num2}</span>
                                                            </div>
                                                            {ex.steps && ex.steps.map((step, i) => (
                                                                <div key={i} className="pr-2 pt-2 text-gray-400">{step}</div>
                                                            ))}
                                                            {ex.steps && <div className="border-b-4 border-gray-600 w-full mt-2 mb-2"></div>}
                                                            <div className="pr-2 pt-2 text-green-400">{ex.ans}</div>
                                                        </div>
                                                    </div>
                                                    <div className="flex-grow bg-gray-700 p-5 rounded-xl border border-gray-600 text-gray-200">
                                                        <MathText text={ex.explanation} />
                                                    </div>
                                                </div>
                                            );
                                        }
                                        return null;
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (screen === 'admin_login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-xl p-8 max-w-sm w-full">
                            <h2 className="text-2xl font-bold mb-6 text-center text-gray-800"><i className="fas fa-user-shield mr-2"></i>Admin Access</h2>
                            <input 
                                type="password" 
                                className="w-full border-2 rounded-lg p-3 mb-4 outline-none focus:border-blue-500 text-center" 
                                placeholder="Enter Password"
                                value={adminPass}
                                onChange={e => setAdminPass(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && loginAdmin()}
                            />
                            <div className="flex gap-2">
                                <button onClick={() => setScreen('home')} className="w-1/3 bg-gray-200 text-gray-700 font-bold py-3 rounded-lg hover:bg-gray-300 transition">Back</button>
                                <button onClick={loginAdmin} className="w-2/3 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">Login</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (screen === 'admin_load') return <div className="min-h-screen flex items-center justify-center text-2xl font-bold">Loading Data...</div>;

            if (screen === 'admin') {
                return (
                    <div className="min-h-screen bg-gray-100 p-8">
                        <div className="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
                            <div className="bg-gray-800 p-6 flex justify-between items-center text-white">
                                <h2 className="text-2xl font-bold"><i className="fas fa-database mr-2"></i> Student Records</h2>
                                <button onClick={() => { setScreen('home'); setAdminPass(''); }} className="bg-red-500 hover:bg-red-600 px-4 py-2 rounded font-bold transition">Logout Admin</button>
                            </div>
                            <div className="overflow-x-auto p-6">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gray-100 text-gray-700">
                                            <th className="p-4 border-b-2 font-bold">Date</th>
                                            <th className="p-4 border-b-2 font-bold">Name</th>
                                            <th className="p-4 border-b-2 font-bold">Category</th>
                                            <th className="p-4 border-b-2 font-bold">Score</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {adminData.map((d, i) => (
                                            <tr key={i} className="hover:bg-gray-50 border-b">
                                                <td className="p-4 text-gray-600">{new Date(d.date).toLocaleString()}</td>
                                                <td className="p-4 font-semibold text-gray-800">{d.name}</td>
                                                <td className="p-4">{d.category}</td>
                                                <td className="p-4 font-bold text-blue-600">{d.score} / {d.total}</td>
                                            </tr>
                                        ))}
                                        {adminData.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-gray-500">No records found.</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
